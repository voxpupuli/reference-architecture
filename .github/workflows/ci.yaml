---
name: Run beaker acceptance tests

on:
  workflow_dispatch:
    inputs:
      collection:
        description: |-
          (Collection) OpenVox collection to use. (ignored if Pre-release Build is true)

          NOTE: This should really only be set to openvox8 when
          testing the main branch. If you need to test openvox7, you
          should run the pipeline from the 7.x branch instead.
        default: 'openvox8'
        type: string

permissions:
  contents: read

env:
  RUBY_VERSION: '3.4.4'

jobs:
  acceptance:
    name: Acceptance Tests
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        os:
          - [almalinux, '8']
          - [almalinux, '9']
    steps:
      - uses: actions/checkout@v4
      - id: vm-cluster
        uses: bastelfreak/nested_vms@reference-architecture
        with:
          os: ${{ matrix.os[0] }}
          os-version: ${{ matrix.os[1] }}
          os-arch: ${{ matrix.os[2] || 'x86_64' }}
          image_version: ${{ matrix.os[3] }}
          host-root-access: true
          ruby-version: ${{ env.RUBY_VERSION }}
          install-openvox: true
          github-runner: false
          debug: true
          vms: |-
            [
              {
                "role": "primary",
                "count": 1,
                "cpus": 8,
                "mem_mb": 4096,
                "cpu_mode": "host-model"
              },
              {
                "role": "agent",
                "count": 1,
                "cpus": 4,
                "mem_mb": 4096,
                "cpu_mode": "host-model"
              }
            ]
      # TODO replace with teardown plan
      - name: Deleting a cluster
        if: always()
        run: virsh net-destroy test
